<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GP Bikes Logged Data Plotter</title>
  <link rel="stylesheet" href="style.css">
  <!-- <script src="https://cdn.plot.ly/plotly-2.20.0.min.js"></script> -->
  <script src="lib/plotly-custom.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <header>
    <div class="header-top">
      <button id="controlsToggle" class="hamburger-btn" aria-label="Open controls" aria-expanded="false" aria-controls="controlsPanel">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <div id="controlsBackdrop" class="controls-backdrop" hidden></div>

  <main>
    <section id="controlsPanel" class="controls" aria-label="Plot controls">
      <div class="controls-header">
        <strong>Controls</strong>
        <button id="controlsClose" class="controls-close" aria-label="Close controls">Close</button>
      </div>
      <div class="controls-intro">
        <h1>GP Bikes Logged Data Plotter</h1>
        <p>Upload one or more CSV logs and plot channels.</p>
      </div>
      <label class="file-label">Select CSV files
        <input id="fileInput" type="file" accept=".csv,text/csv,application/csv,application/vnd.ms-excel" multiple />
        
      </label>

      <div id="filesList" class="files-list"></div>
      <div id="lapsList" class="files-list" style="margin-top:8px"></div>

      <div style="margin-top:6px">
        <label><input type="checkbox" id="shadeLaps" checked /> Shaded area between all laps</label>
      </div>

      <div class="axis-controls">
        <div>
          <strong>X Axis:</strong>
          <label><input type="radio" name="xaxis" value="time" /> Time</label>
          <label><input type="radio" name="xaxis" value="distance" checked /> Distance</label>
        </div>

        <div>
          <strong>Y Channels:</strong>
          <select id="ySelect" multiple size="6"></select>
        </div>

        <div class="xy-controls">
          <strong>XY Plot:</strong>
          <div class="xy-row">
            <label>X: <select id="xColSelect"></select></label>
            <label>Y: <select id="xyYColSelect"></select></label>
          </div>
          <div style="margin-top:6px">
            <button id="plotXYBtn">Plot X vs Y</button>
          </div>
        </div>

        <div>
          <button id="plotBtn">Plot Selected</button>
          <button id="clearBtn">Clear All</button>
        </div>
      </div>

      <div class="controls-version" aria-label="Application version">Version 20260419a</div>
    </section>

    <section class="plot">
      <div id="plotDiv"></div>
    </section>
  </main>

  <footer>
    <small>Supports CSVs with headers. Detects `Time`/`Timestamp` and `Distance` columns. Computes distance if `lat`/`lon` present.</small>
  </footer>

  <script src="file-processors.js"></script>
  <script src="app.js"></script>
</body>
</html>
