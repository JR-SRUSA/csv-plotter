<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GP Bikes Logged Data Plotter</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
</head>
<body>
  <header>
    <div class="header-top">
      <button id="controlsToggle" class="hamburger-btn" aria-label="Open controls" aria-expanded="false" aria-controls="controlsPanel">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <div id="controlsBackdrop" class="controls-backdrop" hidden></div>

  <main>
    <section id="controlsPanel" class="controls" aria-label="Plot controls">
      <div class="controls-header">
        <p></p>
        <button id="controlsClose" class="controls-close" aria-label="Close controls">🗙</button>
      </div>
      <div class="controls-intro">
        <h1>GP Bikes Logged Data Plotter</h1>
        <p>Upload one or more CSV logs and plot channels.</p>
      </div>
      <label class="file-label">Select CSV files
        <input id="fileInput" type="file" accept=".csv,text/csv,application/csv,application/vnd.ms-excel" multiple />
        
      </label>

      <div id="filesList" class="files-list"></div>

      <div class="racing-line-controls">
        <strong>Racing Line Fit</strong>
        <button id="fitRacingLineBtn" type="button">Fit Racing Line</button>
        <div id="racingLineWholeCircuitPanel" class="racing-line-whole-circuit-panel" hidden>
          <div class="racing-line-weight-controls">
            <label>Data Fidelity (β)
              <input id="racingLineBetaWeight" type="range" min="0" max="10" step="0.1" value="1.0" />
              <span id="racingLineBetaWeightValue">1.0</span>
              <input id="racingLineBetaWeightNumber" type="number" min="0" max="10" step="0.1" value="1.0" />
            </label>
            <label>Curvature Smoothness (α)
              <input id="racingLineAlphaWeight" type="range" min="0" max="10" step="0.1" value="1.0" />
              <span id="racingLineAlphaWeightValue">1.0</span>
              <input id="racingLineAlphaWeightNumber" type="number" min="0" max="10" step="0.1" value="1.0" />
            </label>
          </div>
          <div id="racingLineWholeCircuitStatus" class="racing-line-status" aria-live="polite"></div>
          <div class="racing-line-actions">
            <button id="racingLineWholeCircuitPrevCornerBtn" type="button">◀ Prev Corner</button>
            <button id="racingLineWholeCircuitNextCornerBtn" type="button">Next Corner ▶</button>
          </div>
          <div id="racingLineCornerGammaRow" class="racing-line-weight-controls" hidden>
            <label>Minimize Curvature (γ) — this corner only
              <input id="racingLineGammaWeight" type="range" min="0" max="10" step="0.1" value="0" />
              <span id="racingLineGammaWeightValue">0.0</span>
              <input id="racingLineGammaWeightNumber" type="number" min="0" max="10" step="0.1" value="0" />
            </label>
          </div>
          <div class="racing-line-hint">Click a control point on the map to remove it.</div>
          <div class="racing-line-actions">
            <button id="racingLineWholeCircuitAcceptBtn" type="button" disabled>Accept &amp; Add as Lap</button>
            <button id="racingLineWholeCircuitDiscardBtn" type="button">Discard</button>
          </div>
        </div>
      </div>

      <div id="lapsList" class="files-list" style="margin-top:8px"></div>

      <div style="margin-top:6px">
        <label><input type="checkbox" id="shadeLaps" /> Shaded area between all laps</label>
      </div>

      <div class="corner-detect-controls">
        <label><input type="checkbox" id="showCorners" checked /> Show Corners</label>
        <!-- <label>Shading opacity (%)
          <input id="cornerShadeOpacity" type="number" min="0" max="100" step="1" value="5" />
        </label>
        <label><input type="checkbox" id="cornerSwapLR" /> Swap left/right</label> -->
        <div id="cornerTrackInfo" class="corner-track-info" aria-live="polite"></div>
      </div>

      <div class="axis-controls">
        <div>
          <strong>X Axis:</strong>
          <label><input type="radio" name="xaxis" value="time" /> Time</label>
          <label><input type="radio" name="xaxis" value="distance" checked /> Distance</label>
          <label><input type="radio" name="xaxis" value="custom" /> Channel</label>
          <select id="xCustomSelect"></select>
        </div>

        <div>
          <strong>Y Channels:</strong>
          <select id="ySelect" multiple size="6"></select>
          <div id="selectedYColors" class="selected-y-colors"></div>

          <div id="quickModSection" class="quick-modify-section" hidden>
            <div class="quick-mod-header">
              <strong>Quick Modify:</strong>
              <span id="quickModChannelName" class="quick-mod-channel-name"></span>
            </div>
            <div class="quick-mod-options">
              <label><input type="checkbox" id="quickModNegate" /> ×(−1) Negate</label>
              <label><input type="checkbox" id="quickModReciprocal" /> 1/x Reciprocal</label>
              <label><input type="checkbox" id="quickModFilter" /> Forward/Back Filter</label>
              <div id="quickModFilterControls" class="quick-mod-filter-controls" hidden>
                <label>Window: <input id="quickModFilterWindow" type="number" min="0.01" step="0.1" value="0.5" /></label>
                <select id="quickModFilterMode">
                  <option value="time">seconds (time)</option>
                  <option value="distance">meters (dist)</option>
                </select>
              </div>
            </div>
            <button id="quickModCreateBtn" type="button" class="quick-mod-create-btn" disabled>Create Math Channel from Mods</button>
          </div>
        </div>

        <div class="math-channels-controls">
          <div class="math-channels-header">
            <strong>Math Channels:</strong>
            <button id="addMathChannelBtn" type="button" class="math-ch-add-btn">+ Add</button>
          </div>
          <div id="mathChannelsList"></div>
          <div id="mathChannelForm" hidden>
            <div class="math-ch-field">
              <label>Name</label>
              <input id="mathChName" type="text" placeholder="e.g. Speed km/h" />
            </div>
            <div class="math-ch-field math-ch-expr-field">
              <label>Expression (use {Channel Name})</label>
              <input id="mathChExpr" type="text" placeholder="e.g. {Speed} * 3.6" autocomplete="off" />
              <div id="mathChSuggestions" class="math-ch-suggestions" hidden></div>
            </div>
            <div id="mathChPreview" class="math-ch-preview" hidden></div>
            <div class="math-ch-field">
              <label>Unit (optional)</label>
              <input id="mathChUnit" type="text" placeholder="e.g. km/h" style="width:50%" />
            </div>
            <div id="mathChError" class="math-ch-error" hidden></div>
            <div class="math-ch-btns">
              <button id="mathChSave" type="button">Add Channel</button>
              <button id="mathChCancel" type="button">Cancel</button>
            </div>
          </div>
        </div>

        <div class="map-color-controls">
          <label><input type="checkbox" id="mapColorEnabled" checked /> Map Color</label>
          <select id="mapColorSelect" checked></select>
          <label>Map Render
            <select id="mapDrawMode">
              <option value="lines" selected>Lines</option>
              <option value="scatter">Scatter (points)</option>
            </select>
          </label>
          <label>Colormap
            <select id="mapColorMode">
              <option value="continuous">Continuous (Viridis)</option>
              <option value="divergent" selected>Divergent</option>
            </select>
          </label>
        </div>

        <div class="map-align-controls">
          <strong>Map Alignment (Lat/Lon to X/Y)</strong>
          <div class="xy-row">
            <label>X Offset (m): <input id="mapXOffset" type="number" step="0.1" value="0" /></label>
            <label>Y Offset (m): <input id="mapYOffset" type="number" step="0.1" value="0" /></label>
          </div>
          <div class="xy-row">
            <label>Center Lat (deg): <input id="mapCenterLat" type="number" step="0.000001" placeholder="e.g. 40.123456" /></label>
            <label>Center Lng (deg): <input id="mapCenterLon" type="number" step="0.000001" placeholder="e.g. -79.123456" /></label>
          </div>
          <div id="mapFitInfo" class="map-fit-info" aria-live="polite"></div>
          <button id="mapFitBtn" type="button">Fit X,Y to Lat/Lng</button>
        </div>

        <div>
          <button id="clearBtn">Clear All</button>
        </div>
      </div>

  <div class="controls-version" aria-label="Application version">Version 2026-07-11j</div>
    </section>

    <section class="plot">
      <div id="plotDiv"></div>
      <div class="maps-container">
        <div id="mapDiv" class="map-panel"></div>
        <div id="leafletMapDiv" class="map-panel"></div>
      </div>
    </section>
  </main>

  <!-- <footer>
    <small>Supports CSVs with headers. Detects `Time`/`Timestamp` and `Distance` columns. Computes distance if `lat`/`lon` present.</small>
  </footer> -->
  <script src="gpbikes-plotter.bundle.min.js"></script>
</body>
</html>
